# TeleHarvest Docker Compose 生产编排
# 使用方式：
#   1. 复制 config/config.example.yaml 到 config/config.yaml 并修改
#   2. 复制 .env.example 到 .env 并填入 API 凭据
#   3. docker compose up -d

services:
  teleharvest:
    # 镜像选择：本地构建或拉取远程镜像
    build:
      context: ..
      dockerfile: docker/Dockerfile
    # image: ghcr.io/qinmul/teleharvest:latest  # 取消注释以使用远程镜像

    container_name: teleharvest
    restart: unless-stopped

    # 环境变量（从 .env 文件读取）
    env_file:
      - ../.env

    environment:
      # 覆盖配置文件中的路径（容器内固定绝对路径）
      TELEHARVEST_DATABASE__URL: "sqlite+aiosqlite:////home/teleharvest/data/teleharvest.db"
      TELEHARVEST_MONITOR__SESSION_DIR: "/home/teleharvest/data/sessions"
      TELEHARVEST_STORAGE__ROOT_DIR: "/home/teleharvest/data/downloads"
      TELEHARVEST_LOGGING__DIR: "/home/teleharvest/data/logs"
      # 时区
      TZ: Asia/Shanghai

    # 数据卷挂载（持久化）
    volumes:
      # 数据目录：数据库、下载文件、会话、日志
      - ../data:/home/teleharvest/data
      # 配置目录：config.yaml
      - ../config:/home/teleharvest/config

    # 端口映射：健康检查端点（使用不常用端口 18080）
    ports:
      - "18080:18080"

    # 健康检查
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:18080/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

    # 日志驱动配置（避免日志文件无限增长）
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

    # 安全加固
    security_opt:
      - no-new-privileges:true

    # 资源限制（按需调整）
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"

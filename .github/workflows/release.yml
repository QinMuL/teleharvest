# TeleHarvest 镜像发布工作流
# 触发：推送 v* 格式的 git tag（如 v0.1.0）
# 作用：构建 Docker 镜像并推送到 GitHub Container Registry (GHCR)
#
# 使用方式：
#   git tag v0.1.0
#   git push origin v0.1.0
#
# 推送后镜像地址：
#   ghcr.io/qinmul/teleharvest:latest
#   ghcr.io/qinmul/teleharvest:0.1.0

name: Release

on:
  push:
    tags:
      - "v*"

  # 支持手动触发（用于测试或紧急发布）
  workflow_dispatch:

# 同一 tag 的新运行取消旧的
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    name: Build & Push Image
    runs-on: ubuntu-latest

    # 需要仓库写入权限（推送镜像到 GHCR）
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag           # v0.1.0 → 镜像标签 v0.1.0
            type=semver,pattern={{version}}  # v0.1.0 → 镜像标签 0.1.0
            type=semver,pattern={{major}}.{{minor}}  # v0.1.0 → 0.1
            type=raw,value=latest,enable=${{ !github.event.repository.fork }}
            type=sha,format=short        # git short SHA

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### 镜像已发布" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "推送的镜像标签：" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
